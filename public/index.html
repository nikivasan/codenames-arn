<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codenames — ARN Edition</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="landing-page">
  <div class="landing-container">
    <div class="landing-logo">
      <div class="spy-icon">&#128373;</div>
    </div>
    <h1 class="landing-title">CODENAMES</h1>
    <p class="landing-subtitle">ARN Edition</p>
    <p class="landing-tagline">Two teams. Twenty-five words. One winner.</p>

    <div class="board-selection">
      <a href="game.html?board=1" class="board-btn board-btn-1">
        <span class="board-btn-label">Board 1</span>
        <span class="board-btn-hint">25 custom words</span>
      </a>
      <a href="game.html?board=2" class="board-btn board-btn-2">
        <span class="board-btn-label">Board 2</span>
        <span class="board-btn-hint">25 custom words</span>
      </a>
    </div>

    <p class="landing-instructions">
      Share the URL with all players after selecting a board.<br />
      The spymaster activates their view on their own device only.
    </p>
  </div>
</body>
</html>
